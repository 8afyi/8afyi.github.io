<div class="overflow-auto">
  <table class="striped">
    <thead>
      <tr>
        <th>Emoji</th>
        <th>File Name</th>
      </tr>
    </thead>
    <tbody>
      {% for file in include.emoji_files %}
      <tr>
        <td><img src="{{ file.path | relative_url }}" alt="{{ file.name }}" width="96" loading="lazy"></td>
        <td><code>{{ file.name }}</code></td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
