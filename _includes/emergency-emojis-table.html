<table>
  <thead>
    <tr>
      <th>Emoji</th>
      <th>File Name</th>
    </tr>
  </thead>
  <tbody>
    {% for file in include.emoji_files %}
    <tr>
      <td><img src="{{ file.path | relative_url }}" alt="{{ file.name }}" style="max-width: 96px; max-height: 96px;" /></td>
      <td><code>{{ file.name }}</code></td>
    </tr>
    {% endfor %}
  </tbody>
</table>
