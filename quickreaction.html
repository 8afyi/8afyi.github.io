---
layout: null
permalink: /quickreaction/
---
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Quick Reaction</title>
    <style>
      :root {
        color-scheme: light dark;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #111;
        color: #f5f5f5;
        font-family: sans-serif;
      }

      main {
        width: min(100vw, 1000px);
        padding: 24px;
        box-sizing: border-box;
        text-align: center;
      }

      img {
        display: block;
        max-width: 100%;
        max-height: calc(100vh - 48px);
        margin: 0 auto;
      }

      p {
        margin: 0;
      }
    </style>
  </head>
  <body>
    {%- assign reaction_files = site.static_files | where_exp: "file", "file.path contains '/reactions/'" -%}
    <main>
      <img id="reaction-image" alt="Random reaction image" hidden>
      <p id="reaction-message"{% if reaction_files != empty %} hidden{% endif %}>No reaction images found.</p>
    </main>
    <script>
      const reactions = [
        {% for file in reaction_files %}
        "{{ file.path | relative_url }}"{% unless forloop.last %},{% endunless %}
        {% endfor %}
      ];

      const image = document.getElementById("reaction-image");
      const message = document.getElementById("reaction-message");

      if (reactions.length > 0) {
        image.src = reactions[Math.floor(Math.random() * reactions.length)];
        image.hidden = false;
        message.hidden = true;
      }
    </script>
  </body>
</html>
